    async scanBrand(id) {
        this.toast('Scanning for brand mentions and impersonation...', 'warning');
        const sources = ['Twitter', 'Reddit', 'Pastebin', 'GitHub'];
        const sentiments = ['POSITIVE', 'NEGATIVE', 'NEUTRAL', 'SUSPICIOUS'];
        for (let i = 0; i < 3; i++) {
            await this.db.create('mentions', {
                brandId: id,
                source: Utils.randomPick(sources),
                title: `Mention detected on ${Utils.randomPick(sources)}`,
                content: `Potential brand reference found in recent post discussing security concerns...`,
                sentiment: Utils.randomPick(sentiments),
                isImpersonation: Math.random() > 0.7,
            });
        }
        this.toast('Brand scan completed', 'success');
        this.navigate('brand-monitor');
    },

    async renderAlerts(container) {
        const result = await this.db.getAll('alerts', this.pageData.filters, {
            page: this.pageData.page,
            limit: this.pageData.limit,
            sortBy: 'triggeredAt',
            sortOrder: 'desc',
        });

        container.innerHTML = `
            <div class="space-y-6">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-3xl font-bold">Alert Center</h1>
                        <p class="text-sm mt-1" style="color: var(--text-muted);">Security alerts and notifications</p>
                    </div>
                    <div class="flex gap-2">
                        <button class="btn btn-secondary btn-sm" onclick="App.filterAlerts('status', 'NEW')">New Only</button>
                        <button class="btn btn-secondary btn-sm" onclick="App.filterAlerts('severity', 'CRITICAL')">Critical</button>
                        <button class="btn btn-secondary btn-sm" onclick="App.clearFilters()">Clear</button>
                    </div>
                </div>

                <div class="card">
                    <div id="alertsTableContainer"></div>
                </div>
            </div>
        `;

        UI.renderTable('alertsTableContainer', [
            { header: 'Alert', key: 'title', cell: (row) => `
                <div>
                    <div class="font-medium">${row.title}</div>
                    <div class="text-xs mt-1" style="color: var(--text-muted);">${row.description?.substring(0, 60)}...</div>
                </div>
            ` },
            { header: 'Category', key: 'category', cell: (row) => UI.badge(row.category, 'blue') },
            { header: 'Severity', key: 'severity', cell: (row) => UI.badge(row.severity, row.severity === 'CRITICAL' ? 'red' : row.severity === 'HIGH' ? 'amber' : 'blue') },
            { header: 'Status', key: 'status', cell: (row) => UI.badge(row.status, row.status === 'NEW' ? 'red' : row.status === 'RESOLVED' ? 'green' : 'amber') },
            { header: 'Time', key: 'triggeredAt', cell: (row) => `<span class="text-sm" style="color: var(--text-muted);">${Utils.timeAgo(row.triggeredAt)}</span>` },
            { header: '', key: 'actions', cell: (row) => `
                <div class="flex gap-2">
                    ${row.status === 'NEW' ? `<button class="btn btn-sm btn-primary" onclick="event.stopPropagation(); App.ackAlert(${row.id})">Ack</button>` : ''}
                    <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation(); App.resolveAlert(${row.id})">Resolve</button>
                </div>
            ` }
        ], result.data, { pagination: result.meta });
    },

    filterAlerts(key, value) {
        this.pageData.filters = { [key]: value };
        this.pageData.page = 1;
        this.navigate('alerts');
    },

    clearFilters() {
        this.pageData.filters = {};
        this.pageData.page = 1;
        this.navigate('alerts');
    },

    async ackAlert(id) {
        await this.db.update('alerts', id, { status: 'ACKNOWLEDGED', acknowledgedAt: new Date().toISOString() });
        this.toast('Alert acknowledged', 'success');
        this.updateAlertBadge();
        this.navigate('alerts');
    },

    async resolveAlert(id) {
        await this.db.update('alerts', id, { status: 'RESOLVED', resolvedAt: new Date().toISOString() });
        this.toast('Alert resolved', 'success');
        this.updateAlertBadge();
        this.navigate('alerts');
    },

    async updateAlertBadge() {
        const alerts = await this.db.getAll('alerts', { status: 'NEW' }, { limit: 9999 });
        const badge = document.getElementById('alertBadge');
        if (badge) {
            badge.textContent = alerts.data.length;
            badge.style.display = alerts.data.length ? 'inline-flex' : 'none';
        }
    },

    async renderScans(container) {
        const result = await this.db.getAll('scans', {}, {
            page: this.pageData.page,
            limit: this.pageData.limit,
            sortBy: 'createdAt',
            sortOrder: 'desc',
        });

        container.innerHTML = `
            <div class="space-y-6">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-3xl font-bold">Scan Management</h1>
                        <p class="text-sm mt-1" style="color: var(--text-muted);">Reconnaissance and discovery jobs</p>
                    </div>
                    <button class="btn btn-primary" onclick="App.showNewScanModal()">New Scan</button>
                </div>

                <div class="card">
                    <div id="scansTableContainer"></div>
                </div>
            </div>
        `;

        UI.renderTable('scansTableContainer', [
            { header: 'Scan Name', key: 'name', cell: (row) => `
                <div>
                    <div class="font-medium">${row.name || 'Unnamed Scan'}</div>
                    <div class="text-xs mt-1" style="color: var(--text-muted);">${row.scanType || 'OSINT_FULL'}</div>
                </div>
            ` },
            { header: 'Status', key: 'status', cell: (row) => `
                <div class="scan-status">
                    <div class="scan-status-dot ${row.status?.toLowerCase()}"></div>
                    <span class="text-sm font-medium">${row.status}</span>
                </div>
            ` },
            { header: 'Progress', key: 'progress', cell: (row) => `
                <div class="flex items-center gap-3" style="width: 200px;">
                    <div class="progress-bar flex-1"><div class="progress-bar-fill bg-blue-500" style="width: ${row.progress || 0}%"></div></div>
                    <span class="text-xs font-medium" style="width: 40px;">${row.progress || 0}%</span>
                </div>
            ` },
            { header: 'Targets', key: 'targetCount', cell: (row) => `<span class="text-sm">${row.completedCount || 0}/${row.targetCount || 0}</span>` },
            { header: 'Started', key: 'startedAt', cell: (row) => `<span class="text-sm" style="color: var(--text-muted);">${row.startedAt ? Utils.timeAgo(row.startedAt) : 'Pending'}</span>` },
            { header: '', key: 'actions', cell: (row) => `
                <button class="btn btn-sm btn-secondary" ${row.status !== 'RUNNING' ? 'disabled' : ''} onclick="event.stopPropagation(); App.cancelScan(${row.id})">Cancel</button>
            ` }
        ], result.data, { pagination: result.meta });
    },

    showNewScanModal() {
        this.openModal('New Scan Job', UI.renderForm([
            { label: 'Scan Name', name: 'name', type: 'text', required: true },
            { label: 'Scan Type', name: 'scanType', type: 'select', required: true, options: [
                { value: 'DOMAIN_ENUMERATION', label: 'Domain Enumeration' },
                { value: 'SUBDOMAIN_BRUTEFORCE', label: 'Subdomain Bruteforce' },
                { value: 'DNS_ENUMERATION', label: 'DNS Enumeration' },
                { value: 'SSL_CERTIFICATE_SCAN', label: 'SSL Certificate Scan' },
                { value: 'OSINT_FULL', label: 'Full OSINT Scan' },
            ]},
            { label: 'Target Assets (comma separated IDs)', name: 'targets', type: 'text', required: true, placeholder: '1, 2, 3' },
        ], 'App.submitScan'));
    },

    async submitScan(form) {
        const data = Object.fromEntries(new FormData(form));
        data.targets = data.targets.split(',').map(t => parseInt(t.trim())).filter(Boolean);
        data.status = 'PENDING';
        data.progress = 0;
        
        const id = await App.db.create('scans', data);
        App.toast('Scan job created', 'success');
        App.closeModal();
        App.navigate('scans');
        
        setTimeout(() => App.osint.runScanJob({ ...data, id }), 500);
    },

    async cancelScan(id) {
        await this.db.update('scans', id, { status: 'CANCELLED' });
        this.toast('Scan cancelled', 'warning');
        this.navigate('scans');
    },

    async renderReports(container) {
        const result = await this.db.getAll('reports', {}, {
            page: this.pageData.page,
            limit: this.pageData.limit,
            sortBy: 'createdAt',
            sortOrder: 'desc',
        });

        container.innerHTML = `
            <div class="space-y-6">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-3xl font-bold">Report Generator</h1>
                        <p class="text-sm mt-1" style="color: var(--text-muted);">Generate executive and technical reports</p>
                    </div>
                    <button class="btn btn-primary" onclick="App.showNewReportModal()">Generate Report</button>
                </div>

                <div class="card">
                    <div id="reportsTableContainer"></div>
                </div>
            </div>
        `;

        UI.renderTable('reportsTableContainer', [
            { header: 'Report', key: 'title', cell: (row) => `
                <div class="flex items-center gap-3">
                    <div style="width: 40px; height: 40px; border-radius: 8px; background: rgba(59,130,246,0.15); display: flex; align-items: center; justify-content: center; color: #60a5fa;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
                    </div>
                    <div>
                        <div class="font-medium">${row.title}</div>
                        <div class="text-xs mt-1" style="color: var(--text-muted);">${row.type} • ${row.format}</div>
                    </div>
                </div>
            ` },
            { header: 'Status', key: 'status', cell: (row) => UI.badge(row.status, row.status === 'READY' ? 'green' : row.status === 'GENERATING' ? 'amber' : 'blue') },
            { header: 'Generated', key: 'generatedAt', cell: (row) => `<span class="text-sm" style="color: var(--text-muted);">${row.generatedAt ? Utils.timeAgo(row.generatedAt) : 'Pending'}</span>` },
            { header: '', key: 'actions', cell: (row) => `
                <div class="flex gap-2">
                    <button class="btn btn-sm btn-primary" onclick="event.stopPropagation(); App.downloadReport(${row.id})">Download</button>
                    <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation(); App.viewReport(${row.id})">Preview</button>
                </div>
            ` }
        ], result.data, { pagination: result.meta });
    },

    showNewReportModal() {
        this.openModal('Generate New Report', UI.renderForm([
            { label: 'Report Title', name: 'title', type: 'text', required: true },
            { label: 'Report Type', name: 'type', type: 'select', required: true, options: [
                { value: 'EXECUTIVE_SUMMARY', label: 'Executive Summary' },
                { value: 'TECHNICAL_DETAILS', label: 'Technical Details' },
                { value: 'ASSET_INVENTORY', label: 'Asset Inventory' },
                { value: 'THREAT_ASSESSMENT', label: 'Threat Assessment' },
                { value: 'VULNERABILITY_REPORT', label: 'Vulnerability Report' },
            ]},
            { label: 'Format', name: 'format', type: 'select', options: [
                { value: 'PDF', label: 'PDF (Print)', selected: true },
                { value: 'CSV', label: 'CSV Spreadsheet' },
            ]},
            { label: 'Date Range (days)', name: 'dateRange', type: 'text', placeholder: '30', value: '30' },
        ], 'App.submitReport'));
    },

    async submitReport(form) {
        const data = Object.fromEntries(new FormData(form));
        data.status = 'GENERATING';
        
        const id = await App.db.create('reports', data);
        App.toast('Report generation started', 'success');
        App.closeModal();
        App.navigate('reports');
        
        setTimeout(async () => {
            await App.db.update('reports', id, { status: 'READY', generatedAt: new Date().toISOString() });
            App.toast('Report is ready for download', 'success');
            if (App.currentPage === 'reports') App.navigate('reports');
        }, 2000);
    },

    async downloadReport(id) {
        const report = await this.db.getById('reports', id);
        if (!report) return;
        
        if (report.format === 'CSV') {
            const assets = await App.db.getAll('assets', {}, { limit: 9999 });
            const csv = ReportEngine.generateCSV(assets.data, [
                { header: 'Type', key: 'type' }, { header: 'Value', key: 'value' },
                { header: 'Status', key: 'status' }, { header: 'Risk Score', key: 'riskScore' },
            ]);
            Utils.downloadFile(csv, `${report.title}.csv`, 'text/csv;charset=utf-8;');
        } else {
            const assets = await App.db.getAll('assets', {}, { limit: 9999 });
            const alerts = await App.db.getAll('alerts', {}, { limit: 9999 });
            const iocs = await App.db.getAll('iocs', {}, { limit: 9999 });
            
            ReportEngine.generatePDF(report.title, [
                { title: 'Executive Summary', content: `This report covers ${assets.data.length} assets, ${alerts.data.length} alerts, and ${iocs.data.length} threat indicators.` },
                { title: 'Asset Inventory', table: true, columns: ['Type', 'Value', 'Status', 'Risk'], data: assets.data.slice(0, 20).map(a => ({ values: [a.type, a.value, a.status, a.riskScore || 0], class: ['', '', '', a.riskScore > 70 ? 'severity-high' : ''] })) },
                { title: 'Threat Indicators', table: true, columns: ['Type', 'Value', 'Status', 'Confidence'], data: iocs.data.slice(0, 10).map(i => ({ values: [i.type, i.value, i.status, i.confidence] })) },
                { title: 'Active Alerts', table: true, columns: ['Title', 'Severity', 'Status', 'Time'], data: alerts.data.slice(0, 10).map(a => ({ values: [a.title, a.severity, a.status, Utils.timeAgo(a.triggeredAt)] })) },
            ]);
        }
    },

    async viewReport(id) {
        const report = await this.db.getById('reports', id);
        this.openDrawer('Report Preview', `<div class="space-y-4"><h2 class="text-xl font-bold">${report.title}</h2><div class="card"><div class="card-body">Report ${report.status === 'READY' ? 'is ready for download.' : 'is still being generated...'}</div></div></div>`);
    },

    renderSettings(container) {
        container.innerHTML = `
            <div class="space-y-6">
                <div>
                    <h1 class="text-3xl font-bold">System Settings</h1>
                    <p class="text-sm mt-1" style="color: var(--text-muted);">Platform configuration and integrations</p>
                </div>

                <div class="grid grid-cols-1 grid-cols-2 gap-6">
                    <div class="card">
                        <div class="card-header"><div class="card-title">API Integrations</div></div>
                        <div class="card-body space-y-4">
                            <div class="flex items-center justify-between p-3 rounded-lg border" style="border-color: var(--border);">
                                <div><div class="font-medium">VirusTotal</div><div class="text-xs" style="color: var(--text-muted);">Threat reputation API</div></div>
                                <div class="flex items-center gap-2"><span class="badge badge-green">Active</span></div>
                            </div>
                            <div class="flex items-center justify-between p-3 rounded-lg border" style="border-color: var(--border);">
                                <div><div class="font-medium">AbuseIPDB</div><div class="text-xs" style="color: var(--text-muted);">IP reputation check</div></div>
                                <div class="flex items-center gap-2"><span class="badge badge-green">Active</span></div>
                            </div>
                            <div class="flex items-center justify-between p-3 rounded-lg border" style="border-color: var(--border);">
                                <div><div class="font-medium">Shodan</div><div class="text-xs" style="color: var(--text-muted);">Internet scanning</div></div>
                                <div class="flex items-center gap-2"><span class="badge badge-gray">Not Configured</span></div>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header"><div class="card-title">Security Settings</div></div>
                        <div class="card-body space-y-4">
                            <div class="flex items-center justify-between">
                                <div><div class="font-medium">MFA Authentication</div><div class="text-xs" style="color: var(--text-muted);">Require TOTP for all users</div></div>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" class="sr-only peer" checked>
                                    <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                                </label>
                            </div>
                            <div class="flex items-center justify-between">
                                <div><div class="font-medium">Session Timeout</div><div class="text-xs" style="color: var(--text-muted);">Auto logout after 30 min</div></div>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" class="sr-only peer" checked>
                                    <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                                </label>
                            </div>
                            <div class="flex items-center justify-between">
                                <div><div class="font-medium">Audit Logging</div><div class="text-xs" style="color: var(--text-muted);">Log all user actions</div></div>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" class="sr-only peer" checked>
                                    <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="card col-span-2">
                        <div class="card-header"><div class="card-title">System Information</div></div>
                        <div class="card-body">
                            <div class="grid grid-cols-2 gap-4 text-sm">
                                <div><span style="color: var(--text-muted);">Version:</span> <span class="font-medium">1.0.0-PROD</span></div>
                                <div><span style="color: var(--text-muted);">Database:</span> <span class="font-medium">IndexedDB (Browser Native)</span></div>
                                <div><span style="color: var(--text-muted);">Architecture:</span> <span class="font-medium">Single File Application</span></div>
                                <div><span style="color: var(--text-muted);">Compliance:</span> <span class="font-medium">OWASP ASVS L2</span></div>
                                <div><span style="color: var(--text-muted);">Encryption:</span> <span class="font-medium">AES-256 (Client-Side)</span></div>
                                <div><span style="color: var(--text-muted);">Last Backup:</span> <span class="font-medium">Auto (LocalStorage)</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
    },

    openModal(title, bodyHtml, footerHtml = '') {
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalBody').innerHTML = bodyHtml;
        document.getElementById('modalFooter').innerHTML = footerHtml;
        document.getElementById('modalOverlay').classList.add('active');
    },

    closeModal() {
        document.getElementById('modalOverlay').classList.remove('active');
    },

    openDrawer(title, bodyHtml) {
        document.getElementById('drawerTitle').textContent = title;
        document.getElementById('drawerBody').innerHTML = bodyHtml;
        document.getElementById('drawerOverlay').classList.add('active');
        document.getElementById('drawerPanel').classList.add('active');
    },

    closeDrawer() {
        document.getElementById('drawerOverlay').classList.remove('active');
        document.getElementById('drawerPanel').classList.remove('active');
    },

    toast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        const icons = {
            success: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="text-green-500"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
            error: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="text-red-500"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3.75m9-3.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>',
            warning: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="text-amber-500"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>',
        };
        toast.innerHTML = `${icons[type] || icons.success}<span class="font-medium">${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(100%)';
            setTimeout(() => toast.remove(), 300);
        }, 4000);
    },

    handleRowClick(id) {
        if (this.currentPage === 'assets') this.viewAsset(id);
        else if (this.currentPage === 'threat-intel') this.viewIoc(id);
    }
};

document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
